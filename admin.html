<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | SonriSalud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f8fafc; color: var(--secondary); font-family: 'Inter', sans-serif; }
        .admin-nav { background: var(--white); padding: 15px 40px; box-shadow: var(--shadow-sm); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .admin-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--white); padding: 25px; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); border: 1px solid #e2e8f0; }
        .stat-card h4 { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 10px; font-weight: 500; }
        .stat-card .value { font-size: 2rem; font-weight: 700; color: var(--secondary); font-family: 'Outfit', sans-serif; }
        
        .leads-table-container { background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); overflow: hidden; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f1f5f9; padding: 15px 20px; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 15px 20px; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; }
        tr:hover { background: #f8fafc; }
        
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-contacted { background: #dbeafe; color: #1e40af; }
        .badge-appointment { background: #dcfce7; color: #166534; }
        
        .action-btn { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 1rem; padding: 5px; transition: var(--transition); }
        .action-btn:hover { color: var(--accent); }
    </style>
</head>
<body>
    <nav class="admin-nav">
        <div class="logo"><i class="fas fa-tooth"></i> SonriSalud Admin</div>
        <div class="user-info">
            <span id="admin-user">Bienvenido, Admin</span>
            <button class="btn btn-primary" style="padding: 8px 15px; font-size: 0.9rem; margin-left: 15px;">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="admin-container">
        <div class="dashboard-header">
            <div>
                <h1 style="font-family: 'Outfit'; margin-bottom: 5px;">Panel de Gestión</h1>
                <p style="color: var(--text-muted);">Administra tus consultas y pacientes en tiempo real.</p>
            </div>
            <button class="btn btn-primary" onclick="loadLeads()"><i class="fas fa-sync"></i> Actualizar</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h4>Total Consultas</h4>
                <div class="value" id="stat-total">0</div>
            </div>
            <div class="stat-card">
                <h4>Nuevas (Hoy)</h4>
                <div class="value" id="stat-today">0</div>
            </div>
            <div class="stat-card">
                <h4>Pendientes</h4>
                <div class="value" id="stat-pending">0</div>
            </div>
        </div>

        <div class="leads-table-container">
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Paciente</th>
                        <th>Tratamiento</th>
                        <th>Teléfono</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="leads-body">
                    <!-- Leads will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadLeads() {
            try {
                const response = await fetch('http://localhost:5000/api/leads');
                const leads = await response.json();
                renderLeads(leads);
                updateStats(leads);
            } catch (error) {
                console.error('Error al cargar leads:', error);
            }
        }

        function renderLeads(leads) {
            const body = document.getElementById('leads-body');
            body.innerHTML = leads.map(lead => `
                <tr>
                    <td>${lead.fecha}</td>
                    <td>
                        <div style="font-weight: 600;">${lead.nombre}</div>
                        <div style="font-size: 0.8rem; color: #64748b;">${lead.email}</div>
                    </td>
                    <td>${lead.tratamiento}</td>
                    <td><a href="https://wa.me/${lead.telefono.replace(/\D/g,'')}" target="_blank" style="color: #25d366;"><i class="fab fa-whatsapp"></i> ${lead.telefono}</a></td>
                    <td><span class="badge badge-${getStatusClass(lead.estado)}">${lead.estado}</span></td>
                    <td>
                        <button class="action-btn" title="Ver detalle" onclick="alert('${lead.mensaje}')"><i class="fas fa-eye"></i></button>
                        <select onchange="updateStatus(${lead.id}, this.value)" style="padding: 2px; font-size: 0.8rem; border-radius: 4px; border: 1px solid #cbd5e1;">
                            <option value="Pendiente" ${lead.estado === 'Pendiente' ? 'selected' : ''}>Pendiente</option>
                            <option value="Contactado" ${lead.estado === 'Contactado' ? 'selected' : ''}>Contactado</option>
                            <option value="Turno" ${lead.estado === 'Turno' ? 'selected' : ''}>Turno</option>
                        </select>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusClass(status) {
            if (status === 'Pendiente') return 'pending';
            if (status === 'Contactado') return 'contacted';
            if (status === 'Turno') return 'appointment';
            return 'pending';
        }

        function updateStats(leads) {
            document.getElementById('stat-total').innerText = leads.length;
            document.getElementById('stat-pending').innerText = leads.filter(l => l.estado === 'Pendiente').length;
            
            const hoy = new Date().toISOString().split('T')[0];
            document.getElementById('stat-today').innerText = leads.filter(l => l.fecha.startsWith(hoy)).length;
        }

        async function updateStatus(id, nuevoEstado) {
            try {
                await fetch(`http://localhost:5000/api/leads/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ estado: nuevoEstado })
                });
                loadLeads();
            } catch (error) {
                console.error('Error al actualizar estado:', error);
            }
        }

        loadLeads();
    </script>
</body>
</html>
